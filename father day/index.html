<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Father's Day</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Connect CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto&display=swap" rel="stylesheet">
</head>
<body>
  <div class="overlay">
    <div class="container">
      <h1>Happy Father's Day!</h1>
      <p id="message">
        Dear Dad, you are my hero. Thank you for everything! <br>
        ប៉ាជាវីរបុរសរបស់ខ្ញុំ! អរគុណសម្រាប់អ្វីៗទាំងអស់ដែលប៉ាបាន​ផ្ដល់អោយខ្ញុំ
      </p>

      <textarea id="customMessage" placeholder="Write your own message here..."></textarea>
      <button onclick="updateMessage()">Send Message</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
